<mat-sidenav-container class="sidenav-container">
  <mat-sidenav #drawer class="sidenav" fixedInViewport
      [attr.role]="(isHandset$ | async) ? 'dialog' : 'navigation'"
      [mode]="(isHandset$ | async) ? 'over' : 'side'"
      [opened]="false">
    <mat-toolbar>Menu</mat-toolbar>
    <mat-nav-list>
      <a mat-list-item routerLink="/pages/frontline-booking">🧾 Frontline Booking </a>
    </mat-nav-list>
  </mat-sidenav>
  <mat-sidenav-content>
    <mat-toolbar color="primary">
      <button
        type="button"
        aria-label="Toggle sidenav"
        mat-icon-button
        (click)="drawer.toggle()"
        *ngIf="isHandset$ | async">
        <mat-icon aria-label="Side nav toggle icon">menu</mat-icon>
      </button>
      <span>Admin</span>

      <span class="fill-space"></span>
      <div *ngIf="!(isHandset$ | async)">
        <span class="loggedUser" *ngIf="afAuth.authState | async as user" >
          <a mat-button routerLink="/pages/frontline-booking">🧾 Frontline Booking </a>
        </span>

        <a mat-button routerLink="/login" *ngIf="!(afAuth.authState | async)">🔑 Login</a>
        <a mat-button routerLink="/login" *ngIf="afAuth.authState | async as user" >
          <mat-icon>account_circle</mat-icon> {{ user.email }} </a>

      </div>

    </mat-toolbar>
    <!-- Add Content Here -->

    <!-- TRANSCLUSION -->
    <ng-content></ng-content>

    
  </mat-sidenav-content>
  
</mat-sidenav-container>
